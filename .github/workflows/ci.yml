name: Go CI

# 触发条件：当推送代码到 master/dev，或者向 master 发起 PR 时触发
on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # 任务名称：build-and-test (记住这个名字，马上要用)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable' # 自动拉取并使用 Go 的最新稳定版

    - name: Check gofmt
      # 这就是防范之前 0% 格式化问题的终极武器
      run: |
        unformatted=$(gofmt -s -l .)
        if [ -n "$unformatted" ]; then
          echo "⚠️ 以下文件未格式化，请在本地运行 'gofmt -s -w .' 后重新提交："
          echo "$unformatted"
          exit 1
        fi

    - name: Build
      # 尝试编译项目下所有的包，如果有语法错误，这里直接红灯
      run: go build -v ./...

    - name: Test
      # 运行所有的单元测试
      run: go test -v ./...